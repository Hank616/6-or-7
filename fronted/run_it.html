<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>6 or 7 AI</title>

<style>
    body{
        font-family: Arial;
        text-align:center;
        background:#f5f5f5;
    }

    h1{
        margin-top:20px;
    }

    #grid{
        display:grid;
        grid-template-columns: repeat(7, 40px);
        grid-template-rows: repeat(9, 40px);
        gap:2px;

        width:max-content;
        margin:20px auto;
    }

    .cell{
        width:40px;
        height:40px;
        background:white;
        border:0px solid #ccc;
        cursor:pointer;
    }

    .active{
        background:black;
    }

    button{
        padding:10px 20px;
        margin:10px;
        font-size:16px;
        cursor:pointer;
    }

    #result{
        margin-top:20px;
        font-size:20px;
    }

    #weights{
        width:80%;
        margin:auto;
        margin-top:20px;
        background:white;
        padding:10px;
        border-radius:10px;
        text-align:left;
        overflow-wrap:break-word;
    }
</style>
</head>

<body>

<h1>6 or 7 AI</h1>

<div id="grid"></div>

<button onclick="clearGrid()">Clear</button>
<button onclick="readDigit()">Read It</button>
<button onclick="retrain()">Retrain</button>

<div id="result"></div>

<div id="weights">
    <h3>Model Info</h3>

    <div id="sixInfo"></div>
    <br>

    <div id="sevenInfo"></div>
    <br>

    <div id="noneInfo"></div>
</div>

<script>

const WIDTH = 7
const HEIGHT = 9

const grid = document.getElementById("grid")

let drawing = false

// pixel data
let pixels = new Array(WIDTH * HEIGHT).fill(0)


// create cells
for(let i = 0; i < WIDTH * HEIGHT; i++){

    const cell = document.createElement("div")

    cell.classList.add("cell")

    cell.dataset.index = i

    // mouse hold drawing
    cell.addEventListener("mousedown", () => {
        drawing = true
        paint(cell)
    })

    cell.addEventListener("mouseover", () => {
        if(drawing){
            paint(cell)
        }
    })

    grid.appendChild(cell)
}


// stop drawing
document.body.addEventListener("mouseup", () => {
    drawing = false
})


// paint pixel
function paint(cell){

    const index = Number(cell.dataset.index)

    pixels[index] = 1

    cell.classList.add("active")
}


// clear grid
function clearGrid(){

    pixels.fill(0)

    document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("active")
    })

    document.getElementById("result").innerHTML = ""
}


// read digit
async function readDigit(){

    const response = await fetch("http://127.0.0.1:5000/predict", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            pixels:pixels
        })
    })

    const data = await response.json()

    // probabilities
    const sixProb = (data.six * 100).toFixed(1)
    const sevenProb = (data.seven * 100).toFixed(1)
    const noneProb = (data.none * 100).toFixed(1)

    // predicted class
    let prediction = "None"

    if(data.six > data.seven && data.six > data.none){
        prediction = "6"
    }

    if(data.seven > data.six && data.seven > data.none){
        prediction = "7"
    }

    document.getElementById("result").innerHTML = `
        <h2>Prediction: ${prediction}</h2>

        <p>6: ${sixProb}%</p>
        <p>7: ${sevenProb}%</p>
        <p>None: ${noneProb}%</p>
    `


    // print weights and bias
    document.getElementById("sixInfo").innerHTML = `
        <b>6 Model</b><br>
        Bias: ${data.six_bias}<br>
        Weights: ${data.six_weights}
    `

    document.getElementById("sevenInfo").innerHTML = `
        <b>7 Model</b><br>
        Bias: ${data.seven_bias}<br>
        Weights: ${data.seven_weights}
    `

    document.getElementById("noneInfo").innerHTML = `
        <b>None Model</b><br>
        Bias: ${data.none_bias}<br>
        Weights: ${data.none_weights}
    `
}


// retrain model
async function retrain(){

    const response = await fetch("http://127.0.0.1:5000/retrain", {
        method:"POST"
    })

    const data = await response.json()

    alert(data.message)
}

</script>

</body>
</html>
